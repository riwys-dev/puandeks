  <style>   
   body {margin: 0; font-family: "Montserrat", sans-serif; background-color: #f9f9f9; color: #1C1C1C;}

   header {background-color:#1C1C1C;color:#fff;padding:18px 0;}
   header .container {max-width:1100px;margin:0 auto;padding:0 40px;display:flex;align-items:center; gap:10px;}
   header img {height:32px;}
   header small {font-size:12px;color:#fff;opacity:0.9;margin-top:2px;}

  main {max-width:1100px;background:#fff;margin:40px auto;padding:40px 50px;border-radius:12px;border:1px solid #ccc;}

  h1 {font-size: 26px; font-weight: 600; color: #1C1C1C; margin-bottom: 20px; border-left: 5px solid #1B7D2F; padding-left: 12px;}

  footer { text-align: center; color: #666; font-size: 14px; padding: 40px 0 30px; }
  footer a {color: #05462F; text-decoration: none; font-weight: 500; transition: color 0.2s ease;}
  footer a:hover {color: #04DA8D;}

  @media (max-width:768px){main {margin:20px;padding:25px 20px;}}

  #swagger-ui {margin-top:40px;}
  .swagger-ui .topbar {display:none!important;} .swagger-ui .opblock.opblock-get {border-color:#05462F!important;} .swagger-ui .opblock.opblock-post {border-color:#04DA8D!important;} .swagger-ui .opblock-summary-method {background:#05462F!important;color:#fff!important;border-radius:4px;} .swagger-ui .btn.try-out__btn {background:#05462F!important;color:#fff!important;border:none!important;} .swagger-ui .btn.try-out__btn:hover {background:#04DA8D!important;} .swagger-ui .model-box, .swagger-ui .response-col_description__inner {border-color:#ccc!important;} .swagger-ui .opblock-section-header {background:#FCFBF3!important;} .swagger-ui .info hgroup.main a {color:#05462F!important;text-decoration:none!important;} .swagger-ui .info hgroup.main a:hover {color:#04DA8D!important;}

  .dev-menu a:hover {color:#04DA8D!important;} .dev-menu .list-group-item {font-weight:500;font-size:15px;padding:12px 18px;border:none;border-bottom:1px solid #eee;} .dev-menu .list-group-item:last-child {border-bottom:none;} .dev-menu .accordion-button:not(.collapsed) {background:#f8f9fa;color:#05462F;box-shadow:none;} .dev-menu .accordion-button:focus {box-shadow:none;border-color:#ccc;} .dev-menu .d-lg-flex a {transition:color 0.2s ease;} .dev-menu .d-lg-flex a i {min-width:18px;text-align:center;}
  .dev-menu.sticky {position:fixed;top:0;left:0;right:0;z-index:999;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);}

  @media (max-width: 768px) {

  /* Genel hizalama ve boşluklar */
  #swagger-ui .opblock {
    margin: 10px 0 !important;
    padding: 10px !important;
  }

  #swagger-ui .opblock-summary {
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 6px !important;
  }

  /* Balık ve açıklama düzeni */
  #swagger-ui .opblock-summary-description {
    order: 2 !important;
    font-size: 13px !important;
    color: #333 !important;
    line-height: 1.4 !important;
    margin-top: 2px !important;
  }

  #swagger-ui .opblock-summary-path {
    order: 1 !important;
    margin-bottom: 4px !important;
  }

  /* Section padding azaltıldı */
  #swagger-ui .opblock-section {
    padding: 0 10px !important;
  }

  /* Try it out (Dene) butonu */
  #swagger-ui .btn.try-out__btn {
    background: #05462F !important;
    color: #fff !important;
    border: none !important;
    border-radius: 6px !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    padding: 6px 22px !important;    /* kare değil dikdörtgen */
    width: auto !important;
    height: auto !important;
    line-height: 1.4 !important;
    text-align: center !important;
  }

  /* İngilizce metni kaldır, Türkçe göster */
  #swagger-ui .btn.try-out__btn::after {
    content: "Dene" !important;
  }

  #swagger-ui .btn.try-out__btn span {
    display: none !important;
  }

  /* Parametre ve response tablolarında yatay scroll */
  #swagger-ui .responses-table,
  #swagger-ui .parameters-table {
    display: block !important;
    overflow-x: auto !important;
    white-space: nowrap !important;
    -webkit-overflow-scrolling: touch !important;
  }

  /* Kod blokları (örnek JSON) */
  #swagger-ui pre,
  #swagger-ui code {
    font-size: 12px !important;
    word-wrap: break-word !important;
    white-space: pre-wrap !important;
  }

  /* Tablo kolonları tam genişlik */
  #swagger-ui .parameters-col_description,
  #swagger-ui .response-col_description {
    width: 100% !important;
    display: block !important;
  }

  /* Alt boşluklar sadeleştirildi */
  #swagger-ui .responses-wrapper,
  #swagger-ui .parameters {
    margin-bottom: 12px !important;
  }
}
